<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OTP Verification</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: #f4f4f4;
}

.container {
    text-align: center;
    background: white;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

h2 {
    margin-bottom: 20px;
}

.otp-box {
    display: flex;
    gap: 10px;
    justify-content: center;
}

.otp-box input {
    width: 50px;
    height: 50px;
    text-align: center;
    font-size: 22px;
    border: 2px solid #ccc;
    border-radius: 8px;
    outline: none;
}

.otp-box input:focus {
    border-color: #007bff;
}

button {
    margin-top: 20px;
    padding: 12px 25px;
    border: none;
    background: #007bff;
    color: white;
    border-radius: 8px;
    cursor: pointer;
}

button:hover {
    background: #0056b3;
}
</style>
</head>
<body>

<div class="container">
    <h2>Masukkan Kode OTP</h2>

    <div class="otp-box">
        <input type="text" maxlength="1">
        <input type="text" maxlength="1">
        <input type="text" maxlength="1">
        <input type="text" maxlength="1">
        <input type="text" maxlength="1">
        <input type="text" maxlength="1">
    </div>

    <button onclick="verifyOTP()">Verifikasi</button>
</div>

<script>
const inputs = document.querySelectorAll(".otp-box input");

inputs.forEach((input, index) => {
    input.addEventListener("input", () => {
        if (input.value.length === 1 && index < inputs.length - 1) {
            inputs[index + 1].focus();
        }
    });

    input.addEventListener("keydown", (e) => {
        if (e.key === "Backspace" && input.value === "" && index > 0) {
            inputs[index - 1].focus();
        }
    });
});

function verifyOTP() {
    let otp = "";
    inputs.forEach(input => {
        otp += input.value;
    });

    alert("Kode OTP yang dimasukkan: " + otp);
}
</script>

</body>
</html>
