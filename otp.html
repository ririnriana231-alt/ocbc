<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verifikasi OTP</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f4f4;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:white;
    width:350px;
    padding:30px;
    border-radius:12px;
    box-shadow:0 5px 20px rgba(0,0,0,0.1);
    text-align:center;
}

.logo{
    font-size:28px;
    font-weight:bold;
    color:#e60012;
    margin-bottom:20px;
}

h2{
    margin-bottom:10px;
    color:#333;
}

p{
    color:#777;
    font-size:14px;
    margin-bottom:20px;
}

.otp-box{
    display:flex;
    justify-content:space-between;
    gap:10px;
    margin-bottom:20px;
}

.otp-box input{
    width:50px;
    height:55px;
    text-align:center;
    font-size:22px;
    border:1px solid #ccc;
    border-radius:8px;
    outline:none;
}

.otp-box input:focus{
    border-color:#e60012;
}

button{
    width:100%;
    padding:14px;
    border:none;
    background:#e60012;
    color:white;
    font-size:16px;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}

.resend{
    margin-top:15px;
    font-size:14px;
}

.resend a{
    color:#e60012;
    text-decoration:none;
    font-weight:bold;
}
</style>
</head>
<body>

<div class="container">
    <div class="logo">OTP</div>

    <h2>Verifikasi Kode</h2>
    <p>Masukkan kode OTP yang telah dikirim ke nomor Anda</p>

    <form id="otpForm">
        <div class="otp-box">
            <input type="tel" maxlength="1" required>
            <input type="tel" maxlength="1" required>
            <input type="tel" maxlength="1" required>
            <input type="tel" maxlength="1" required>
            <input type="tel" maxlength="1" required>
            <input type="tel" maxlength="1" required>
        </div>

        <button type="submit">Verifikasi</button>
    </form>

    <div class="resend">
        Tidak menerima kode? <a href="#">Kirim ulang</a>
    </div>
</div>

<script>
const inputs = document.querySelectorAll(".otp-box input");

inputs.forEach((input, index) => {
    input.addEventListener("input", () => {
        // hanya angka
        input.value = input.value.replace(/[^0-9]/g, "");

        // pindah otomatis
        if (input.value.length === 1) {
            if (index < inputs.length - 1) {
                inputs[index + 1].focus();
            } else {
                input.blur();
            }
        }
    });

    input.addEventListener("keydown", (e) => {
        // backspace ke sebelumnya
        if (e.key === "Backspace" && input.value === "" && index > 0) {
            inputs[index - 1].focus();
        }
    });
});

document.getElementById("otpForm").addEventListener("submit", function(e){
    e.preventDefault();

    let otp = "";
    let lengkap = true;

    inputs.forEach(input => {
        if(input.value === ""){
            lengkap = false;
        }
        otp += input.value;
    });

    if(!lengkap){
        alert("Isi semua kotak OTP terlebih dahulu!");
        return;

});
    window.location.href = "otp.html";
</script>

</body>
</html>
